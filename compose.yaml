networks:
  paint-war:
    driver: bridge

volumes:
  paint_war_pg_data:
  paint_war_server_tmp:

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
      network: "host"
    env_file:
      - .env.development
    environment:
      - GOCACHE=/home/appuser/.cache/go-build
      - GOMODCACHE=/home/appuser/.cache/go-mod
      - GOPATH=/home/appuser/go
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
      - paint_war_server_tmp:/app/tmp
    networks:
      - "paint-war"
    depends_on:
      database:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
      network: "host"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    env_file:
      - .env.development
    networks:
      - "paint-war"
    depends_on:
      - server

  database:
    image: "postgres:16.0-alpine3.18"
    env_file:
      - .env.development
    ports:
      - "5432:5432"
    volumes:
      - paint_war_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - "paint-war"

  database-manager:
    container_name: "paint-war-pgadmin"
    image: "dpage/pgadmin4:9.15.0"
    env_file:
      - .env.development
    ports:
      - "5050:80"
    networks:
      - "paint-war"

